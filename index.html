<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plekhanov.prod</title>
    <link rel="stylesheet" href="style.css">
</head>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    const links = document.querySelectorAll('.header a');
    
    links.forEach(link => {
        if (link.getAttribute('href') === currentPage) {
            link.classList.add('active');
        }
    });
});
</script>
<body>
    <nav class="header">
        <a href="index.html" class="logo">plekhanov.<span>prod</span></a>
        <ul>
            <li><a href="index.html" class="active">Главная</a></li>
            <li><a href="portfolio.html">Портфолио</a></li>
            <li><a href="prices.html">Цены</a></li>
            <li><a href="contacts.html">Контакты</a></li>
        </ul>
    </nav>
    
    <main class="main-content">
    <!-- YOUR BACKGROUND IMAGE -->
    <div class="hero" style="background-image: url('YOUR-BACKGROUND-IMAGE.jpg');">
        <div class="hero-overlay"></div>
        
        <!-- BIO TEXT HIGHER - OVER BACKGROUND -->
        <section class="bio hero-bio">
            <h2>О себе</h2>
            <p>Пасте сюда свою биографию. Профессиональный видеограф из Франкфурта...</p>
            <p>15+ лет опыта в видеопроизводстве...</p>
        </section>
    </div>
    </main>
</body>
</html>
